name: Build and Release

# Push a tag like "v1.1.0" to publish a new release that clients will pick up automatically.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore WpfStandaloneUpdateApp.csproj

      - name: Publish
        run: >
          dotnet publish WpfStandaloneUpdateApp.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o ./publish

      - name: Install vpk (Velopack CLI)
        run: dotnet tool install -g vpk

      - name: Pack with Velopack
        run: >
          vpk pack
          -u WpfStandaloneUpdateApp
          -v ${{ steps.version.outputs.VERSION }}
          -p ./publish
          -e WpfStandaloneUpdateApp.exe
          -o ./release

      - name: Publish to GitHub Releases
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --tag ${{ github.ref_name }}
          -o ./release
