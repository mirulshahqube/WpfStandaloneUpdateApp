name: Build and Release

# Push a tag like "v1.1.0" to publish a new release that clients will pick up automatically.
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag is on master
        shell: bash
        run: |
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "Tag $GITHUB_REF_NAME is not on master - aborting release."
            exit 1
          fi

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore WpfStandaloneUpdateApp.csproj

      - name: Publish
        run: >
          dotnet publish WpfStandaloneUpdateApp.csproj
          -c Release
          -r win-x64
          --self-contained true
          -o ./publish

      - name: Install vpk (Velopack CLI)
        run: dotnet tool install -g vpk

